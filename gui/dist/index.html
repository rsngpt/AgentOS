<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Agent OS</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e;
    --accent: #58a6ff; --ok: #3fb950; --bad: #f85149; --warn: #d29922;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 12px; }
  main { flex: 1; display: grid; grid-template-columns: 280px 1fr; min-height: 0; }

  /* ---- left: new sandbox form ---- */
  #form {
    border-right: 1px solid var(--border); background: var(--panel);
    padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
  }
  #form h2, .pane h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim);
  }
  label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 3px; }
  input, select, textarea, button {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 12px;
  }
  textarea { font-family: var(--mono); resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  button { cursor: pointer; }
  #runBtn { background: #1f6feb; border-color: #1f6feb; font-weight: 600; padding: 8px; }
  #runBtn:hover { background: #388bfd; }
  #formError { color: var(--bad); font-size: 12px; min-height: 16px; }

  /* ---- right: sandboxes + panes ---- */
  #right { display: grid; grid-template-rows: auto 1fr 220px; min-height: 0; }
  .pane { padding: 10px 14px; overflow: auto; min-height: 0; }
  #sandboxes { border-bottom: 1px solid var(--border); max-height: 220px; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  th { text-align: left; color: var(--dim); font-size: 11px; font-weight: 500; padding: 3px 8px; }
  td { padding: 4px 8px; border-top: 1px solid var(--border); font-size: 12px; }
  td.id { font-family: var(--mono); color: var(--dim); }
  .state { padding: 1px 8px; border-radius: 10px; font-size: 11px; }
  .state.running { background: rgba(63,185,80,.15); color: var(--ok); }
  .state.exited  { background: rgba(139,148,158,.15); color: var(--dim); }
  .state.killed  { background: rgba(248,81,73,.15); color: var(--bad); }
  .state.booting, .state.provisioning { background: rgba(210,153,34,.15); color: var(--warn); }
  .killBtn {
    width: auto; padding: 2px 10px; font-size: 11px;
    background: rgba(248,81,73,.1); color: var(--bad); border-color: rgba(248,81,73,.4);
  }
  .killBtn:hover { background: var(--bad); color: #fff; }
  .saveBtn { width: auto; padding: 2px 10px; font-size: 11px; color: var(--dim); }

  #terminal {
    background: #010409; font-family: var(--mono); font-size: 12px;
    white-space: pre-wrap; word-break: break-all; padding: 10px 14px; overflow-y: auto;
  }
  #terminal .err { color: var(--bad); }
  #terminal .meta { color: var(--accent); }

  #network { border-top: 1px solid var(--border); display: flex; flex-direction: column; }
  #netrows { flex: 1; overflow-y: auto; margin-top: 6px; font-family: var(--mono); font-size: 12px; }
  .net { display: flex; gap: 10px; padding: 2px 0; border-top: 1px solid #21262d; }
  .net .t { color: var(--dim); width: 70px; flex: none; }
  .net .v { width: 52px; flex: none; font-weight: 600; }
  .net .allow { color: var(--ok); } .net .deny { color: var(--bad); }
  #stats { color: var(--dim); font-size: 11px; margin-left: auto; font-family: var(--mono); }
</style>
</head>
<body>
<header>
  <h1>Agent OS</h1>
  <span class="sub">hardware-isolated agent sandboxes</span>
  <button id="panicBtn" class="killBtn" title="Terminate the newest running sandbox">
    Kill switch ⇧⌘K
  </button>
  <span id="hotkeyWarn" class="sub" style="display:none; color:var(--warn)"></span>
  <span id="stats"></span>
</header>
<main>
  <div id="form">
    <h2>New sandbox</h2>
    <div>
      <label>Command</label>
      <input id="cmd" placeholder="python3 agent.py" value="sh -c 'echo hello from a microVM'">
    </div>
    <div>
      <label>Mounts — one per line, PATH[:ro|rw]</label>
      <textarea id="mounts" rows="3" placeholder="./project:rw&#10;/data/corpus"></textarea>
    </div>
    <div>
      <label>Git repo — cloned host-side, mounted at /workspace</label>
      <input id="repo" placeholder="https://github.com/owner/name.git">
    </div>
    <div>
      <label>Template — presets the ecosystem's allowlist</label>
      <select id="template">
        <option value="" selected>none</option>
        <option value="python">python (pypi)</option>
        <option value="node">node (npm)</option>
        <option value="github">github</option>
      </select>
    </div>
    <div>
      <label>Environment — one KEY=VALUE per line</label>
      <textarea id="env" rows="2" placeholder="OPENAI_API_KEY=sk-..."></textarea>
    </div>
    <div>
      <label>Network</label>
      <select id="netmode">
        <option value="offline" selected>offline — no network at all</option>
        <option value="allowlist">allowlist — only listed hosts</option>
        <option value="full">full — public internet, LAN blocked</option>
      </select>
    </div>
    <div id="hostsWrap" style="display:none">
      <label>Allowed hosts (comma-separated)</label>
      <input id="hosts" placeholder="api.openai.com, *.github.com">
    </div>
    <div class="row2">
      <div><label>vCPUs</label><input id="vcpus" type="number" value="2" min="1" max="16"></div>
      <div><label>RAM (MiB)</label><input id="mem" type="number" value="2048" min="128"></div>
    </div>
    <h2>Auto-kill</h2>
    <div class="row3">
      <div><label>Mem MiB</label><input id="akMem" type="number" placeholder="—"></div>
      <div><label>Egress MiB</label><input id="akEgress" type="number" placeholder="—"></div>
      <div><label>Secs</label><input id="akSecs" type="number" placeholder="—"></div>
    </div>
    <button id="runBtn">▶ Run in sandbox</button>
    <div id="formError"></div>
  </div>

  <div id="right">
    <div class="pane" id="sandboxes">
      <h2>Sandboxes</h2>
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>State</th><th></th></tr></thead>
        <tbody id="sbRows"><tr><td colspan="4" style="color:var(--dim)">none yet</td></tr></tbody>
      </table>
    </div>
    <div id="terminal"><span class="meta">— terminal: output of the most recent run appears here —</span>
</div>
    <div class="pane" id="network">
      <h2>Network monitor</h2>
      <div id="netrows"></div>
    </div>
  </div>
</main>

<script>
const invoke = window.__TAURI__.core.invoke;
const listen = window.__TAURI__.event.listen;
const $ = (id) => document.getElementById(id);

$("netmode").addEventListener("change", () => {
  $("hostsWrap").style.display = $("netmode").value === "allowlist" ? "" : "none";
});

function bytesToText(arr) {
  return new TextDecoder().decode(new Uint8Array(arr || []));
}
function termAppend(text, cls) {
  const t = $("terminal");
  const span = document.createElement("span");
  if (cls) span.className = cls;
  span.textContent = text;
  t.appendChild(span);
  t.scrollTop = t.scrollHeight;
}

// ---- run form ----
$("runBtn").addEventListener("click", async () => {
  $("formError").textContent = "";
  const mode = $("netmode").value;
  const net = mode === "allowlist"
    ? "allowlist:" + $("hosts").value.split(",").map(s => s.trim()).filter(Boolean).join(",")
    : mode;
  const optNum = (id) => $(id).value ? Number($(id).value) : null;
  $("terminal").textContent = "";
  termAppend("▶ " + $("cmd").value + "\n", "meta");
  try {
    await invoke("run_sandbox", {
      command: $("cmd").value,
      mounts: $("mounts").value.split("\n"),
      net,
      template: $("template").value || null,
      repo: $("repo").value || null,
      env: $("env").value.split("\n"),
      vcpus: Number($("vcpus").value),
      memMib: Number($("mem").value),
      killOverMem: optNum("akMem"),
      killOverEgress: optNum("akEgress"),
      killAfterSecs: optNum("akSecs"),
    });
  } catch (e) {
    $("formError").textContent = String(e);
  }
});

// ---- run output stream ----
listen("run-line", ({ payload: v }) => {
  switch (v.event) {
    case "created": termAppend("sandbox " + v.id + "\n", "meta"); break;
    case "stdout": termAppend(bytesToText(v.data)); break;
    case "stderr": termAppend(bytesToText(v.data), "err"); break;
    case "exited": termAppend("\n■ exited code=" + v.code + "\n", "meta"); break;
    case "terminated":
      termAppend("\n■ terminated (" + (v.reason || "kill switch") + ")" +
        (v.saved_dir ? "\n  saved: " + v.saved_dir : "") + "\n", "err");
      break;
    case "error": termAppend("\n■ error: " + v.message + "\n", "err"); break;
  }
});

// ---- sandbox table ----
async function refresh() {
  try {
    const list = await invoke("list_sandboxes");
    const rows = $("sbRows");
    if (!list.length) {
      rows.innerHTML = '<tr><td colspan="4" style="color:var(--dim)">none yet</td></tr>';
      return;
    }
    rows.innerHTML = "";
    for (const sb of list) {
      const st = sb.state.state;
      const tr = document.createElement("tr");
      tr.innerHTML =
        `<td class="id">${sb.id.slice(0, 8)}</td><td>${sb.name}</td>` +
        `<td><span class="state ${st}">${st}</span></td><td style="text-align:right"></td>`;
      // Lifecycle controls, matching what the CLI can do.
      const btn = (label, cls, fn) => {
        const b = document.createElement("button");
        b.className = cls; b.textContent = label;
        b.onclick = () => fn().catch(alert);
        return b;
      };
      const cell = tr.lastChild;
      const spacer = () => document.createTextNode(" ");
      if (st === "running") {
        cell.append(
          btn("pause", "saveBtn", () => invoke("pause_sandbox", { id: sb.id })), spacer(),
          btn("snapshot", "saveBtn", () => invoke("snapshot_sandbox", { id: sb.id })), spacer(),
        );
      } else if (st === "paused") {
        cell.append(
          btn("resume", "saveBtn", () => invoke("resume_sandbox", { id: sb.id })), spacer(),
          btn("snapshot", "saveBtn", () => invoke("snapshot_sandbox", { id: sb.id })), spacer(),
        );
      } else if (st === "snapshotted") {
        cell.append(btn("restore", "saveBtn", () => invoke("restore_sandbox", { id: sb.id })));
      }
      if (st === "running" || st === "paused" || st === "booting" || st === "provisioning") {
        cell.append(
          btn("kill+save", "saveBtn", () => invoke("kill_sandbox", { id: sb.id, save: true })),
          spacer(),
          btn("Terminate", "killBtn", () => invoke("kill_sandbox", { id: sb.id, save: false })),
        );
      }
      rows.appendChild(tr);
    }
  } catch (e) { /* daemon not up yet */ }
}
setInterval(refresh, 1000);
refresh();

// ---- event bus: network monitor + resource stats ----
listen("agentos-event", ({ payload: ev }) => {
  const k = ev.kind;
  if (k.kind === "net_verdict") {
    const row = document.createElement("div");
    row.className = "net";
    const time = new Date(ev.timestamp_ms).toLocaleTimeString();
    row.innerHTML =
      `<span class="t">${time}</span>` +
      `<span class="v ${k.allowed ? "allow" : "deny"}">${k.allowed ? "ALLOW" : "DENY"}</span>` +
      `<span>${k.dest_host}:${k.dest_port}</span>` +
      `<span style="color:var(--dim)">${ev.sandbox.slice(0, 8)}</span>`;
    const rows = $("netrows");
    rows.prepend(row);
    while (rows.children.length > 200) rows.lastChild.remove();
  } else if (k.kind === "resource_sample") {
    $("stats").textContent =
      `${ev.sandbox.slice(0, 8)}  cpu ${k.cpu_percent}% · mem ${k.mem_mib} MiB · disk ${k.disk_used_mib ?? 0} MiB · egress ${(k.egress_total_bytes / 1048576).toFixed(1)} MiB`;
  } else if (k.kind === "state_changed") {
    refresh();
  }
});

// ---- panic kill switch ----
// The button always works; the global hotkey additionally works when the
// window isn't focused, if the OS lets us register it.
$("panicBtn").addEventListener("click", async () => {
  try {
    const r = await invoke("panic_kill");
    termAppend(r.killed ? `\n■ kill switch: terminated ${r.id}\n` : "\n■ nothing running\n", "err");
  } catch (e) {
    termAppend("\n■ kill switch failed: " + e + "\n", "err");
  }
  refresh();
});

listen("panic-kill", () => {
  termAppend("\n■ panic kill switch (⇧⌘K)\n", "err");
  refresh();
});

// Say so when the hotkey couldn't be registered — a kill switch you believe
// in but that never fires is worse than one you know is unavailable.
listen("hotkey-status", ({ payload }) => {
  if (!payload.available) {
    const w = $("hotkeyWarn");
    w.textContent = "⇧⌘K unavailable — use the button (grant Accessibility to enable)";
    w.style.display = "";
  }
});
</script>
</body>
</html>
